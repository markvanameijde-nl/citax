<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rekenen">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="rekenen.webmanifest">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%231a1a2e'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='system-ui,sans-serif' font-size='110' font-weight='800' fill='%234a6cf7'%3E%C3%B7%3C/text%3E%3C/svg%3E">
    <title>Rekenen oefenen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #f0f0f0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            transition: background-color 0.3s ease;
        }

        body.correct { background: #2ecc71; }
        body.wrong   { background: #e74c3c; }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 16px;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            min-height: 0;
        }
        .screen.active { display: flex; }

        /* --- Home screen --- */
        #home h1 {
            text-align: center;
            font-size: 2rem;
            margin: 24px 0 8px;
        }
        #home .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 32px;
            font-size: 1.1rem;
        }
        .op-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            align-content: center;
            padding-bottom: 16px;
        }
        .op-btn {
            background: #2a2a4a;
            color: #fff;
            border: 3px solid #3a3a5c;
            border-radius: 24px;
            font-size: 6rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s, border-color 0.2s;
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: inherit;
        }
        .op-btn:active { transform: scale(0.96); background: #3a3a6a; }
        .op-btn.plus   { color: #5acf8f; }
        .op-btn.minus  { color: #f7b74a; }
        .op-btn.times  { color: #f75a8c; }
        .op-btn.divide { color: #5a9cf7; }

        /* --- Practice screen --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .back-btn {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }
        .back-btn:active { background: rgba(255,255,255,0.24); }

        .score {
            display: flex;
            gap: 14px;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .score .good { color: #5acf8f; }
        .score .bad  { color: #f75a8c; }
        body.correct .score .good, body.correct .score .bad,
        body.wrong   .score .good, body.wrong   .score .bad { color: #fff; }

        .sum-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 0;
        }
        .sum-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.25em;
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 800;
            letter-spacing: 0.03em;
            line-height: 1.1;
            text-align: center;
        }
        .answer-display {
            min-width: 2.5ch;
            display: inline-block;
            text-align: left;
            border-bottom: 4px solid rgba(255,255,255,0.4);
            min-height: 1.1em;
            padding: 0 0.1em;
        }
        .answer-display.empty::after {
            content: '\00a0';
        }
        .feedback-text {
            font-size: 1.4rem;
            font-weight: 700;
            min-height: 1.6rem;
            text-align: center;
            margin-top: 6px;
        }

        /* Numpad */
        .pad-wrap {
            margin-top: auto;
            padding-top: 8px;
        }
        .repeat-btn {
            width: 100%;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            font-family: inherit;
        }
        .repeat-btn:active { background: rgba(255,255,255,0.22); }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .num-btn {
            background: #2a2a4a;
            color: #fff;
            border: 2px solid #3a3a5c;
            border-radius: 16px;
            font-size: 2.2rem;
            font-weight: 700;
            cursor: pointer;
            padding: 14px 0;
            min-height: 64px;
            transition: transform 0.08s, background 0.15s;
            font-family: inherit;
        }
        .num-btn:active {
            transform: scale(0.94);
            background: #3a3a6a;
        }
        .num-btn.clear {
            background: #5c2a3a;
            border-color: #7a3a4c;
            color: #ffb4c4;
        }
        .num-btn.clear:active { background: #7c3a4c; }
        .num-btn.ok {
            background: #2c5c3a;
            border-color: #3a7a4c;
            color: #b4ffc4;
        }
        .num-btn.ok:active { background: #3c7c4c; }

        /* --- Tafels screen --- */
        #tafels h1 {
            text-align: center;
            font-size: 2rem;
            margin: 16px 0 4px;
        }
        #tafels .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 16px;
            font-size: 1.05rem;
        }
        .tafels-top {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .tafel-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            align-content: center;
            padding-bottom: 12px;
        }
        .tafel-btn {
            background: #2a2a4a;
            color: #fff;
            border: 2px solid #3a3a5c;
            border-radius: 16px;
            font-size: 2rem;
            font-weight: 700;
            cursor: pointer;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            transition: transform 0.08s, background 0.15s;
            color: #f75a8c;
        }
        .tafel-btn:active {
            transform: scale(0.94);
            background: #3a3a6a;
        }

        @media (max-width: 380px) {
            .op-btn { font-size: 4.5rem; min-height: 100px; border-radius: 20px; }
            .num-btn { font-size: 1.8rem; min-height: 56px; padding: 10px 0; }
            #home h1 { font-size: 1.5rem; margin: 16px 0 4px; }
            #home .subtitle { font-size: 1rem; margin-bottom: 20px; }
            #tafels h1 { font-size: 1.5rem; }
            .tafel-btn { font-size: 1.5rem; min-height: 54px; }
        }

        @media (max-height: 640px) {
            .sum-row { font-size: clamp(2.5rem, 10vw, 4rem); }
            .num-btn { min-height: 52px; padding: 8px 0; font-size: 1.7rem; }
            .op-btn { min-height: 90px; font-size: 4rem; }
            .feedback-text { font-size: 1.15rem; min-height: 1.3rem; }
            .tafel-btn { min-height: 48px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<section id="home" class="screen active">
    <h1>REKENEN</h1>
    <p class="subtitle">Maak je keuze</p>
    <div class="op-grid">
        <button class="op-btn plus"   data-op="+" aria-label="Optellen">+</button>
        <button class="op-btn minus"  data-op="-" aria-label="Aftrekken">−</button>
        <button class="op-btn times"  data-op="*" aria-label="Vermenigvuldigen">×</button>
        <button class="op-btn divide" data-op="/" aria-label="Delen">÷</button>
    </div>
</section>

<section id="tafels" class="screen">
    <div class="tafels-top">
        <button class="back-btn" id="tafels-back-btn">&larr; Terug</button>
    </div>
    <h1>TAFELS</h1>
    <p class="subtitle">Welke tafel wil je oefenen?</p>
    <div class="tafel-grid" id="tafel-grid"></div>
</section>

<section id="practice" class="screen">
    <div class="top-bar">
        <button class="back-btn" id="back-btn">&larr; Terug</button>
        <div class="score">
            <span class="good">&#10003; <span id="score-good">0</span></span>
            <span class="bad">&#10007; <span id="score-bad">0</span></span>
        </div>
    </div>

    <div class="sum-area">
        <div class="sum-row">
            <span id="sum-a"></span>
            <span id="sum-op"></span>
            <span id="sum-b"></span>
            <span>=</span>
            <span class="answer-display empty" id="answer"></span>
        </div>
        <div class="feedback-text" id="feedback">&nbsp;</div>
    </div>

    <div class="pad-wrap">
        <button class="repeat-btn" id="repeat-btn">&#128266; Herhaal som</button>
        <div class="numpad" id="numpad">
            <button class="num-btn" data-key="1">1</button>
            <button class="num-btn" data-key="2">2</button>
            <button class="num-btn" data-key="3">3</button>
            <button class="num-btn" data-key="4">4</button>
            <button class="num-btn" data-key="5">5</button>
            <button class="num-btn" data-key="6">6</button>
            <button class="num-btn" data-key="7">7</button>
            <button class="num-btn" data-key="8">8</button>
            <button class="num-btn" data-key="9">9</button>
            <button class="num-btn clear" data-key="C">C</button>
            <button class="num-btn" data-key="0">0</button>
            <button class="num-btn ok" data-key="OK">OK</button>
        </div>
    </div>
</section>

<script>
(function () {
    'use strict';

    // ---------- Dutch number words (for spoken sums) ----------
    const UNITS = ['nul','een','twee','drie','vier','vijf','zes','zeven','acht','negen'];
    const TEENS = ['tien','elf','twaalf','dertien','veertien','vijftien','zestien','zeventien','achttien','negentien'];
    const TENS  = ['','','twintig','dertig','veertig','vijftig','zestig','zeventig','tachtig','negentig'];

    function numberToDutch(n) {
        if (n < 0) return 'min ' + numberToDutch(-n);
        if (n < 10) return UNITS[n];
        if (n < 20) return TEENS[n - 10];
        if (n === 100) return 'honderd';
        if (n < 100) {
            const t = Math.floor(n / 10);
            const u = n % 10;
            if (u === 0) return TENS[t];
            const unitWord = UNITS[u];
            const joiner = (unitWord === 'twee' || unitWord === 'drie') ? 'ën' : 'en';
            return unitWord + joiner + TENS[t];
        }
        return String(n);
    }

    const OP_SYMBOLS = { '+': '+', '-': '−', '*': '×', '/': ':' };
    const OP_SPOKEN  = { '+': 'plus', '-': 'min', '*': 'keer', '/': 'gedeeld door' };

    let currentOp = null;
    let currentTafel = null; // chosen multiplication table (1-20) when op === '*'
    let tafelQueue = [];     // shuffled remaining factors 1-20 for the current tafel
    let currentSum = null;
    let score = { good: 0, bad: 0 };
    let answerInput = '';
    let locked = false;

    const homeScreen     = document.getElementById('home');
    const tafelsScreen   = document.getElementById('tafels');
    const tafelGridEl    = document.getElementById('tafel-grid');
    const tafelsBackBtn  = document.getElementById('tafels-back-btn');
    const practiceScreen = document.getElementById('practice');
    const sumAEl         = document.getElementById('sum-a');
    const sumOpEl        = document.getElementById('sum-op');
    const sumBEl         = document.getElementById('sum-b');
    const answerEl       = document.getElementById('answer');
    const feedbackEl     = document.getElementById('feedback');
    const scoreGoodEl    = document.getElementById('score-good');
    const scoreBadEl     = document.getElementById('score-bad');
    const backBtn        = document.getElementById('back-btn');
    const repeatBtn      = document.getElementById('repeat-btn');
    const numpadEl       = document.getElementById('numpad');

    // ---------- Fullscreen / app feel ----------
    function tryFullscreen() {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) { try { req.call(el); } catch (e) {} }
    }

    // ---------- Screens ----------
    function showHome() {
        stopSpeech();
        clearBodyColor();
        practiceScreen.classList.remove('active');
        tafelsScreen.classList.remove('active');
        homeScreen.classList.add('active');
    }

    function showTafels() {
        stopSpeech();
        clearBodyColor();
        homeScreen.classList.remove('active');
        practiceScreen.classList.remove('active');
        tafelsScreen.classList.add('active');
    }

    function showPractice(op, tafel) {
        currentOp = op;
        currentTafel = tafel != null ? tafel : null;
        tafelQueue = [];
        score = { good: 0, bad: 0 };
        updateScore();
        homeScreen.classList.remove('active');
        tafelsScreen.classList.remove('active');
        practiceScreen.classList.add('active');
        nextSum();
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function nextTafelFactor() {
        if (tafelQueue.length === 0) {
            tafelQueue = shuffle(Array.from({ length: 20 }, (_, i) => i + 1));
        }
        return tafelQueue.pop();
    }

    // ---------- Sum generation ----------
    function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeSum(op) {
        let a, b, answer;
        switch (op) {
            case '+':
                a = randInt(1, 20);
                b = randInt(1, 20);
                answer = a + b;
                break;
            case '-':
                a = randInt(1, 20);
                b = randInt(1, 20);
                if (b > a) [a, b] = [b, a];
                answer = a - b;
                break;
            case '*':
                if (currentTafel != null) {
                    a = currentTafel;
                    b = nextTafelFactor();
                } else {
                    a = randInt(1, 10);
                    b = randInt(1, 10);
                }
                answer = a * b;
                break;
            case '/':
                answer = randInt(1, 10);
                b = randInt(1, 10);
                a = answer * b;
                break;
        }
        return { a, b, op, answer };
    }

    function nextSum() {
        clearBodyColor();
        feedbackEl.textContent = '\u00a0';
        answerInput = '';
        renderAnswer();
        locked = false;
        currentSum = makeSum(currentOp);
        sumAEl.textContent  = currentSum.a;
        sumOpEl.textContent = OP_SYMBOLS[currentOp];
        sumBEl.textContent  = currentSum.b;
        speakSum(currentSum);
    }

    // ---------- Speech synthesis ----------
    const synth = window.speechSynthesis;
    let dutchVoice = null;

    function pickDutchVoice() {
        if (!synth) return;
        const voices = synth.getVoices();
        dutchVoice =
            voices.find(v => v.lang === 'nl-NL') ||
            voices.find(v => /^nl/i.test(v.lang)) ||
            null;
    }
    if (synth) {
        pickDutchVoice();
        if (typeof synth.onvoiceschanged !== 'undefined') {
            synth.onvoiceschanged = pickDutchVoice;
        }
    }

    function speak(text, onEnd) {
        if (!synth) { if (onEnd) onEnd(); return; }
        try { synth.cancel(); } catch (e) {}
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'nl-NL';
        u.rate = 0.95;
        u.pitch = 1.0;
        if (dutchVoice) u.voice = dutchVoice;
        u.onend = () => { if (onEnd) onEnd(); };
        u.onerror = () => { if (onEnd) onEnd(); };
        synth.speak(u);
    }

    function speakSum(sum, onEnd) {
        const aWord = numberToDutch(sum.a);
        const bWord = numberToDutch(sum.b);
        speak(`${aWord} ${OP_SPOKEN[sum.op]} ${bWord}`, onEnd);
    }

    function stopSpeech() {
        if (synth) { try { synth.cancel(); } catch (e) {} }
    }

    // ---------- Input handling ----------
    function renderAnswer() {
        if (answerInput === '') {
            answerEl.textContent = '';
            answerEl.classList.add('empty');
        } else {
            answerEl.textContent = answerInput;
            answerEl.classList.remove('empty');
        }
    }

    function handleKey(key) {
        if (locked) return;
        if (key === 'C') {
            answerInput = '';
            renderAnswer();
            return;
        }
        if (key === 'OK') {
            if (answerInput === '') return;
            submitAnswer(parseInt(answerInput, 10));
            return;
        }
        if (answerInput.length >= 3) return;
        if (answerInput === '' && key === '0') return;
        answerInput += key;
        renderAnswer();
    }

    function submitAnswer(given) {
        locked = true;
        const correct = given === currentSum.answer;
        if (correct) {
            score.good++;
            updateScore();
            document.body.classList.add('correct');
            feedbackEl.textContent = 'Goed zo!';
            speak('Goed zo!');
            setTimeout(nextSum, 1300);
        } else {
            score.bad++;
            updateScore();
            document.body.classList.add('wrong');
            const answerWord = numberToDutch(currentSum.answer);
            feedbackEl.textContent = `Het juiste antwoord is ${currentSum.answer}`;
            speak(`Het juiste antwoord is ${answerWord}`, () => {
                setTimeout(nextSum, 500);
            });
            setTimeout(() => {
                if (document.body.classList.contains('wrong')) nextSum();
            }, 4500);
        }
    }

    function updateScore() {
        scoreGoodEl.textContent = score.good;
        scoreBadEl.textContent  = score.bad;
    }

    function clearBodyColor() {
        document.body.classList.remove('correct', 'wrong');
    }

    // ---------- Tafels grid ----------
    function buildTafelGrid() {
        for (let i = 1; i <= 20; i++) {
            const btn = document.createElement('button');
            btn.className = 'tafel-btn';
            btn.textContent = i;
            btn.dataset.tafel = i;
            tafelGridEl.appendChild(btn);
        }
    }
    buildTafelGrid();

    // ---------- Event wiring ----------
    document.querySelectorAll('.op-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            tryFullscreen();
            stopSpeech();
            const op = btn.dataset.op;
            if (op === '*') {
                showTafels();
            } else {
                showPractice(op);
            }
        });
    });

    tafelGridEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.tafel-btn');
        if (!btn) return;
        showPractice('*', parseInt(btn.dataset.tafel, 10));
    });

    tafelsBackBtn.addEventListener('click', showHome);

    backBtn.addEventListener('click', () => {
        if (currentOp === '*') showTafels();
        else showHome();
    });

    repeatBtn.addEventListener('click', () => {
        if (!currentSum) return;
        speakSum(currentSum);
    });

    numpadEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.num-btn');
        if (!btn) return;
        handleKey(btn.dataset.key);
    });

    document.addEventListener('keydown', (e) => {
        if (!practiceScreen.classList.contains('active')) return;
        if (e.key >= '0' && e.key <= '9') handleKey(e.key);
        else if (e.key === 'Enter') handleKey('OK');
        else if (e.key === 'Backspace' || e.key === 'Escape' || e.key === 'Delete') handleKey('C');
    });

    document.addEventListener('gesturestart', (e) => e.preventDefault());
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopSpeech();
    });
})();
</script>
</body>
</html>
