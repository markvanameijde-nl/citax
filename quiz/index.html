<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Quiz</title>

  <!-- Viewport locked; disable user zoom for a native-app feel -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / theming -->
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="color-scheme" content="dark" />
  <link rel="manifest" href="manifest.json" />

  <!-- iOS home-screen web app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Quiz" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Full-screen feedback overlay (flashes green/red on answer) -->
  <div id="flash" class="flash" aria-hidden="true"></div>

  <main class="app" id="app">
    <header class="scoreboard" aria-label="Scorebord">
      <div class="score-item score-correct">
        <span class="score-label">Goed</span>
        <span class="score-value" id="score-correct">0</span>
      </div>
      <div class="score-item score-wrong">
        <span class="score-label">Fout</span>
        <span class="score-value" id="score-wrong">0</span>
      </div>
      <div class="score-item score-total">
        <span class="score-label">Totaal</span>
        <span class="score-value" id="score-total">0</span>
      </div>
    </header>

    <div class="rate-control">
      <label class="rate-label" for="rate">
        Spreeksnelheid
        <span class="rate-value" id="rate-value">1.0&times;</span>
      </label>
      <input
        id="rate"
        class="rate-slider"
        type="range"
        min="0.7"
        max="1.4"
        step="0.05"
        value="1.0"
        aria-label="Spreeksnelheid"
      />
    </div>

    <section class="question-card" id="question-card" aria-live="polite">
      <div class="category-badge" id="category-badge">—</div>
      <h1 class="question-text" id="question-text">Bezig met laden…</h1>

      <div class="options" id="options" role="list">
        <!-- Option buttons are rendered by app.js -->
      </div>
    </section>

    <footer class="controls">
      <button class="btn btn-secondary" id="btn-reset" type="button" aria-label="Reset score">
        Reset score
      </button>
      <button class="btn btn-primary" id="btn-next" type="button" aria-label="Volgende vraag">
        Volgende vraag
      </button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
